<!doctype html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShopPrime | Modern Multi-Product E-Commerce Store</title>

    <meta
      name="description"
      content="ShopPrime is a modern multi-product e-commerce platform offering premium electronics, headphones, smart devices, and accessories with a seamless shopping experience."
    />

    <meta
      name="keywords"
      content="ShopPrime, ecommerce, online shopping, headphones, electronics, React, TypeScript, Bootstrap"
    />

    <meta name="author" content="ShopPrime" />
    <meta name="robots" content="index, follow" />

    <!-- Canonical -->
    <link
      rel="canonical"
      href="https://shopprime-react.netlify.app/"
    />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Theme -->
    <meta name="theme-color" content="#5B5BD6" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ShopPrime" />
    <meta
      property="og:title"
      content="ShopPrime | Modern Multi-Product E-Commerce Store"
    />
    <meta
      property="og:description"
      content="Discover premium headphones, electronics and accessories with a modern shopping experience."
    />
    <meta
      property="og:image"
      content="https://shopprime-react.netlify.app/og-image.png"
    />
    <meta
      property="og:url"
      content="https://shopprime-react.netlify.app/"
    />
    <meta property="og:locale" content="en_US" />

    <!-- Image Dimensions -->
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="ShopPrime | Modern Multi-Product E-Commerce Store"
    />
    <meta
      name="twitter:description"
      content="Discover premium headphones, electronics and accessories."
    />
    <meta
      name="twitter:image"
      content="https://shopprime-react.netlify.app/og-image.png"
    />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
